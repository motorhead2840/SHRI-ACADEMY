version: 1
applications:
  - appRoot: artifacts/shri-academy
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10
            - pnpm config set store-dir .pnpm-store
            - pnpm install --frozen-lockfile
        build:
          commands:
            # Set default fallback values for required build variables if not provided in the console environment
            - export PORT=${PORT:-8080}
            - export BASE_PATH=${BASE_PATH:-/}
            - pnpm --filter @workspace/shri-academy run build
      artifacts:
        # Path is relative to the appRoot (artifacts/shri-academy)
        baseDirectory: dist/public
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
  - appRoot: artifacts/sri-platform
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10
            - pnpm config set store-dir .pnpm-store
            - pnpm install --frozen-lockfile
        build:
          commands:
            # Set default fallback values for required build variables if not provided in the console environment
            - export PORT=${PORT:-8080}
            - export BASE_PATH=${BASE_PATH:-/}
            - pnpm --filter @workspace/sri-platform run build
      artifacts:
        # Path is relative to the appRoot (artifacts/sri-platform)
        baseDirectory: dist/public
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
