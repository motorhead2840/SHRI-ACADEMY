name: Deploy service → ECR → ECS (reusable)

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow called by deploy-monorepo.yml for each service.
# Callers pass service-specific values via `with:` inputs and share
# the AWS_DEPLOY_ROLE_ARN secret.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      # Human-readable label used in the job name
      service_label:
        description: 'Human-readable service name (e.g. api-server)'
        required: true
        type: string

      # Docker build context path (relative to repo root)
      docker_context:
        description: 'Docker build context path (e.g. . or shri-academy-api/)'
        required: true
        type: string

      # Dockerfile path (relative to repo root)
      dockerfile:
        description: 'Path to Dockerfile (relative to repo root)'
        required: true
        type: string

      # ECR repository name (e.g. sri/api-server)
      ecr_repo:
        description: 'ECR repository name'
        required: true
        type: string

      # ECS service name
      ecs_service:
        description: 'ECS service name'
        required: true
        type: string

      # ECS task definition family name
      task_def_family:
        description: 'ECS task definition family'
        required: true
        type: string

      # Container name in the task definition to update
      container_name:
        description: 'Container name to update in the task definition'
        required: true
        type: string

      # Whether to also push a mutable :latest tag
      push_latest:
        description: 'Push a mutable :latest tag in addition to the versioned tag'
        required: false
        type: boolean
        default: false

      # Optional URL to curl after ECS deploy to verify the service is healthy
      health_check_url:
        description: 'URL to hit after ECS deploy (smoke test). Leave empty to skip.'
        required: false
        type: string
        default: ''

      aws_region:
        required: false
        type: string
        default: us-east-1

      ecs_cluster:
        required: false
        type: string
        default: sri-production

    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  deploy:
    name: ${{ inputs.service_label }} → ECR → ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tags and build metadata
        id: meta
        shell: bash
        run: |
          REF="${{ github.ref_name }}"
          SHA7="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          VERSIONED_TAG="${REGISTRY}/${{ inputs.ecr_repo }}:${REF}-${SHA7}"
          LATEST_TAG="${REGISTRY}/${{ inputs.ecr_repo }}:latest"
          echo "versioned=${VERSIONED_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST_TAG}"       >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}"   >> "$GITHUB_OUTPUT"
          # Build a clean tag list — only include :latest when push_latest is true
          {
            echo "tags<<EOF"
            echo "${VERSIONED_TAG}"
            [[ "${{ inputs.push_latest }}" == "true" ]] && echo "${LATEST_TAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=${{ inputs.service_label }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service_label }}

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.versioned }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Capture current ECS task definition ARN (for rollback)
        id: current-task-def
        run: |
          PREVIOUS_ARN=$(aws ecs describe-services \
            --cluster "${{ inputs.ecs_cluster }}" \
            --services "${{ inputs.ecs_service }}" \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "previous_arn=${PREVIOUS_ARN}" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ inputs.task_def_family }}" \
            --query taskDefinition \
          | jq 'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .registeredAt,
              .registeredBy,
              .compatibilities,
              .requiresAttributes
            )' \
          > task-def.json

      - name: Render updated task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name:  ${{ inputs.container_name }}
          image:           ${{ steps.meta.outputs.versioned }}

      - name: Deploy to ECS (circuit-breaker enabled)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ inputs.ecs_service }}
          cluster:                    ${{ inputs.ecs_cluster }}
          wait-for-service-stability: true

      - name: Smoke test — verify new version is responding
        if: inputs.health_check_url != ''
        run: |
          echo "=== Smoke test: ${{ inputs.health_check_url }} ==="
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "${{ inputs.health_check_url }}"; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt ${i} failed, retrying in 15s..."
            sleep 15
          done
          echo "❌ Smoke test failed after 5 attempts"
          exit 1

      - name: Rollback to previous task definition on failure
        if: failure() && steps.current-task-def.outputs.previous_arn != ''
        run: |
          echo "=== Rolling back to ${{ steps.current-task-def.outputs.previous_arn }} ==="
          aws ecs update-service \
            --cluster "${{ inputs.ecs_cluster }}" \
            --service  "${{ inputs.ecs_service }}" \
            --task-definition "${{ steps.current-task-def.outputs.previous_arn }}" \
            --force-new-deployment

      - name: Print ECS events on failure
        if: failure()
        run: |
          echo "=== ECS service events (last 5) ==="
          aws ecs describe-services \
            --cluster "${{ inputs.ecs_cluster }}" \
            --services "${{ inputs.ecs_service }}" \
            --query 'services[0].events[:5]' \
            --output table
