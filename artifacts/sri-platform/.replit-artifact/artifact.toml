kind = "web"
previewPath = "/"
title = "SRI Contemplative AI Platform"
version = "1.0.0"
id = "artifacts/sri-platform"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21761

[services.development]
run = "pnpm --filter @workspace/sri-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sri-platform", "run", "build" ]
serve = "static"
publicDir = "artifacts/sri-platform/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21761"
BASE_PATH = "/"
